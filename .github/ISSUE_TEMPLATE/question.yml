# SPDX-License-Identifier: MIT

name: Question
description: Ask a question about this project
title: "[Question]: "
labels: ["question", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for your question! Please provide as much context as possible to help us give you the best answer.

  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false

  - type: textarea
    id: question
    attributes:
      label: What is your question?
      description: Please be as specific as possible about what you want to know.
      placeholder: I would like to know...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: |
        Please provide context about what you're trying to achieve:
        - What are you working on?
        - What have you tried so far?
        - What documentation have you already checked?
      placeholder: |
        I'm trying to...
        I've already tried...
        I've looked at...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment (if relevant)
      description: |
        If your question is environment-specific, please provide:
        - OS (e.g., Ubuntu 20.04, Windows Server 2019)
        - GitHub Actions runner type (e.g., ubuntu-latest, self-hosted)
        - Action version
        - Any relevant configuration
      placeholder: |
        OS: Ubuntu 20.04
        Runner: ubuntu-latest
        Action version: v1.x
        Configuration: ...
    validations:
      required: false

  - type: textarea
    id: code-examples
    attributes:
      label: Code Examples (if applicable)
      description: If your question involves code, please share relevant examples. This will be automatically formatted into code, so no need for backticks.
      render: yaml

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: How urgent is getting an answer to this question?
      options:
        - Low - just curious
        - Medium - would help with my project
        - High - blocking my work
    validations:
      required: false

  - type: checkboxes
    id: research
    attributes:
      label: Research
      description: Please confirm you have done the following
      options:
        - label: I have searched existing issues and discussions for similar questions
          required: true
        - label: I have read the documentation and README
          required: true
        - label: I have checked the project's examples and quickstart guide
          required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
