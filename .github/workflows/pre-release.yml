# SPDX-License-Identifier: MIT
---
name: Pre-Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
          - custom
      custom_version:
        description: 'Custom version (only if custom selected)'
        required: false
        type: string
      prerelease_suffix:
        description: 'Prerelease suffix (alpha, beta, rc)'
        required: false
        default: 'beta'
        type: choice
        options:
          - alpha
          - beta
          - rc
      create_release:
        description: 'Create release immediately'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    outputs:
      new-version: ${{ steps.version.outputs.new-version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Get current version
        id: current-version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git tag --sort=-version:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "current-version=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Current version: $LATEST_TAG"

      - name: Calculate new version
        id: version
        env:
          CURRENT: ${{ steps.current-version.outputs.current-version }}
          VERSION_TYPE: ${{ github.event.inputs.version_type }}
          CUSTOM_VERSION: ${{ github.event.inputs.custom_version }}
          PRERELEASE_SUFFIX: ${{ github.event.inputs.prerelease_suffix }}
        run: |

          # Remove 'v' prefix for calculation
          # shellcheck disable=SC2001
          CURRENT_NO_V=$(echo "$CURRENT" | sed 's/^v//')

          case "$VERSION_TYPE" in
            custom)
              if [ -z "$CUSTOM_VERSION" ]; then
                echo "❌ Custom version is required when version_type is custom"
                exit 1
              fi
              NEW_VERSION="$CUSTOM_VERSION"
              ;;
            patch)
              NEW_VERSION=$(echo "$CURRENT_NO_V" | awk -F. '{$3 = $3 + 1} 1' OFS=".")
              ;;
            minor)
              NEW_VERSION=$(echo "$CURRENT_NO_V" | awk -F. '{$2 = $2 + 1; $3 = 0} 1' OFS=".")
              ;;
            major)
              NEW_VERSION=$(echo "$CURRENT_NO_V" | awk -F. '{$1 = $1 + 1; $2 = 0; $3 = 0} 1' OFS=".")
              ;;
            prerelease)
              # Check if current version is already a prerelease
              if [[ "$CURRENT_NO_V" =~ -([a-zA-Z]+)\.([0-9]+)$ ]]; then
                # Increment prerelease number
                # shellcheck disable=SC2001
                PREFIX=$(echo "$CURRENT_NO_V" | sed 's/-[a-zA-Z]\+\.[0-9]\+$//')
                SUFFIX=$(echo "$CURRENT_NO_V" | grep -o '[a-zA-Z]\+' | tail -n 1)
                NUMBER=$(echo "$CURRENT_NO_V" | grep -o '[0-9]\+$')
                NEW_NUMBER=$(("$NUMBER" + 1))
                NEW_VERSION="${PREFIX}-${SUFFIX}.${NEW_NUMBER}"
              else
                # Create first prerelease
                NEW_VERSION="${CURRENT_NO_V}-${PRERELEASE_SUFFIX}.1"
              fi
              ;;
            *)
              echo "❌ Unknown version type: $VERSION_TYPE"
              exit 1
              ;;
          esac

          # Add 'v' prefix back
          NEW_VERSION="v$NEW_VERSION"

          echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Calculated new version: $NEW_VERSION"

      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6

      - name: Run pre-release tests
        run: |
          echo "🧪 Running pre-release test suite..."
          just test-basic
          just test-integration
          echo "✅ All tests passed"

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_VERSION="${STEPS_CURRENT_VERSION_OUTPUTS_CURRENT_VERSION}"
          NEW_VERSION="${STEPS_VERSION_OUTPUTS_NEW_VERSION}"

          echo "Generating changelog from $CURRENT_VERSION to $NEW_VERSION"

          # shellcheck disable=SC2086,SC2129
          CHANGELOG=$(cat << EOF
          ## Changes in $NEW_VERSION

          ### 🚀 New Features
          $(git log --oneline ${CURRENT_VERSION}..HEAD --grep="feat\|feature" --pretty="- %s")

          ### 🐛 Bug Fixes
          $(git log --oneline ${CURRENT_VERSION}..HEAD --grep="fix\|bug" --pretty="- %s")

          ### 🔒 Security Updates
          $(git log --oneline ${CURRENT_VERSION}..HEAD --grep="security\|sec\|vuln" --pretty="- %s")

          ### 📝 Documentation
          $(git log --oneline ${CURRENT_VERSION}..HEAD --grep="doc\|docs" --pretty="- %s")

          ### 🧪 Testing
          $(git log --oneline ${CURRENT_VERSION}..HEAD --grep="test" --pretty="- %s")

          ### Other Changes
          $(git log --oneline ${CURRENT_VERSION}..HEAD --grep="chore\|refactor\|style" --pretty="- %s")
          EOF
          )

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          STEPS_CURRENT_VERSION_OUTPUTS_CURRENT_VERSION: ${{ steps.current-version.outputs.current-version }}
          STEPS_VERSION_OUTPUTS_NEW_VERSION: ${{ steps.version.outputs.new-version }}

      - name: Create tag (if create_release is true)
        if: github.event.inputs.create_release == 'true'
        run: |
          NEW_VERSION="${STEPS_VERSION_OUTPUTS_NEW_VERSION}"

          # Create and push tag
          git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$NEW_VERSION"

          echo "🏷️ Tag $NEW_VERSION created and pushed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          STEPS_VERSION_OUTPUTS_NEW_VERSION: ${{ steps.version.outputs.new-version }}

      - name: Create release preparation PR (if create_release is false)
        if: github.event.inputs.create_release == 'false'
        run: |
          NEW_VERSION="${STEPS_VERSION_OUTPUTS_NEW_VERSION}"
          BRANCH_NAME="release/prepare-$NEW_VERSION"

          # Create preparation branch
          git checkout -b "$BRANCH_NAME"

          # Usage examples are pinned to full commit SHAs; release prep should
          # not rewrite them to mutable version tags.

          # Create release notes file
          printf '%s\n' "$STEPS_CHANGELOG_OUTPUTS_CHANGELOG" > RELEASE_NOTES.md
          git add RELEASE_NOTES.md

          # Commit changes
          git commit -m "Prepare release $NEW_VERSION" || echo "No changes to commit"

          # Push branch
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$BRANCH_NAME"

          # Create PR
          gh pr create \
            --title "🚀 Prepare release $NEW_VERSION" \
            --body "This PR prepares the release for $NEW_VERSION.

          ## Changes
          ${STEPS_CHANGELOG_OUTPUTS_CHANGELOG}

          ## Next Steps
          1. Review the changes
          2. Merge this PR
          3. Create a tag \`$NEW_VERSION\` to trigger the release workflow

          ## Quick Release
          After merging, run:
          \`\`\`bash
          git tag -a $NEW_VERSION -m \"Release $NEW_VERSION\"
          git push origin $NEW_VERSION
          \`\`\`" \
            --base main \
            --head "$BRANCH_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          STEPS_VERSION_OUTPUTS_NEW_VERSION: ${{ steps.version.outputs.new-version }}
          STEPS_CHANGELOG_OUTPUTS_CHANGELOG: ${{ steps.changelog.outputs.changelog }}

  output-summary:
    runs-on: ubuntu-latest
    needs: prepare-release
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      - name: Release Summary
        env:
          CREATE_RELEASE: ${{ github.event.inputs.create_release }}
          NEEDS_PREPARE_RELEASE_OUTPUTS_NEW_VERSION: ${{ needs.prepare-release.outputs.new-version }}
        run: |
          # shellcheck disable=SC2129
          echo "## 🚀 Release Preparation Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**New Version:** ${NEEDS_PREPARE_RELEASE_OUTPUTS_NEW_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Action Taken:**" >> "$GITHUB_STEP_SUMMARY"
          if [ "$CREATE_RELEASE" == "true" ]; then
            echo "- ✅ Tag created and release workflow triggered" >> "$GITHUB_STEP_SUMMARY"
            release_url="https://github.com/${{ github.repository }}/releases/tag"
            release_tag="${NEEDS_PREPARE_RELEASE_OUTPUTS_NEW_VERSION}"
            echo "- 📦 Release will be available at: $release_url/$release_tag" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- 📝 Preparation PR created" >> "$GITHUB_STEP_SUMMARY"
            echo "- 🔍 Review the PR and merge when ready" >> "$GITHUB_STEP_SUMMARY"
            echo "- 🏷️ Create tag manually to trigger release" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Usage" >> "$GITHUB_STEP_SUMMARY"
          echo "Pin workflow usage to the full release commit SHA." >> "$GITHUB_STEP_SUMMARY"
