# SPDX-License-Identifier: MIT
---
# Integration test - simulates real-world usage
# Run with: act -W .github/workflows/integration-test.yml
name: Integration Test - Real World Scenario

on:
  workflow_dispatch:
  push:
    paths:
      - 'action.yml'

permissions:
  contents: read

jobs:
  # Simulate a typical Node.js project security scan
  nodejs-project-scan:
    name: Node.js Project Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Create Realistic Node.js Project
        run: |
          # Create a realistic Node.js project structure
          mkdir -p integration-test/{src,tests,config,public}

          # Package.json
          cat > integration-test/package.json << 'EOF'
          {
            "name": "vulnerable-web-app",
            "version": "1.0.0",
            "main": "src/app.js",
            "dependencies": {
              "express": "^4.18.0",
              "mysql": "^2.18.0",
              "lodash": "^4.17.0"
            }
          }
          EOF

          # Main application with vulnerabilities
          cat > integration-test/src/app.js << 'EOF'
          const express = require('express');
          const mysql = require('mysql');
          const { exec } = require('child_process');
          const fs = require('fs');

          const app = express();
          app.use(express.json());

          // SQL Injection vulnerability
          app.get('/user/:id', (req, res) => {
              const query = `SELECT * FROM users WHERE id = '${req.params.id}'`;
              connection.query(query, (err, results) => {
                  res.json(results);
              });
          });

          // Command Injection vulnerability
          app.post('/backup', (req, res) => {
              const filename = req.body.filename;
              exec(`tar -czf backup_${filename}.tar.gz ./data`, (error, stdout) => {
                  if (error) return res.status(500).send(error.message);
                  res.send('Backup created');
              });
          });

          // Path Traversal vulnerability
          app.get('/download/:file', (req, res) => {
              const filepath = `./uploads/${req.params.file}`;
              res.download(filepath);
          });

          // XSS vulnerability
          app.get('/search', (req, res) => {
              const query = req.query.q;
              res.send(`<h1>Search results for: ${query}</h1>`);
          });

          // Weak crypto
          app.get('/token', (req, res) => {
              const token = Math.random().toString(36).substring(2);
              res.json({ token });
          });

          app.listen(3000, () => {
              console.log('Server running on port 3000');
          });
          EOF

          # Authentication module with issues
          cat > integration-test/src/auth.js << 'EOF'
          const crypto = require('crypto');
          const jwt = require('jsonwebtoken');

          // Hardcoded secret (bad practice)
          const JWT_SECRET = 'hardcoded-secret-key';

          // Weak password hashing
          function hashPassword(password) {
              return crypto.createHash('md5').update(password).digest('hex');
          }

          // JWT with hardcoded secret
          function generateToken(user) {
              return jwt.sign(user, JWT_SECRET);
          }

          // Timing attack vulnerability
          function comparePasswords(provided, stored) {
              if (provided.length !== stored.length) return false;

              for (let i = 0; i < provided.length; i++) {
                  if (provided[i] !== stored[i]) return false;
              }
              return true;
          }

          module.exports = { hashPassword, generateToken, comparePasswords };
          EOF

          # Database module with SQL injection
          cat > integration-test/src/database.js << 'EOF'
          const mysql = require('mysql');

          const connection = mysql.createConnection({
              host: 'localhost',
              user: 'root',
              password: '',  // Empty password (security issue)
              database: 'webapp'
          });

          // Dynamic query building (vulnerable)
          function searchUsers(searchTerm, callback) {
              const query = "SELECT * FROM users WHERE name LIKE '%" + searchTerm + "%'";
              connection.query(query, callback);
          }

          // Admin check with SQL injection
          function isAdmin(userId, callback) {
              const query = `SELECT role FROM users WHERE id = ${userId}`;
              connection.query(query, (err, results) => {
                  callback(err, results[0]?.role === 'admin');
              });
          }

          module.exports = { searchUsers, isAdmin };
          EOF

          # Client-side JavaScript with XSS
          cat > integration-test/public/app.js << 'EOF'
          // DOM-based XSS vulnerability
          function displayMessage(msg) {
              document.getElementById('output').innerHTML = msg;
          }

          // Eval vulnerability
          function executeUserCode(code) {
              eval(code);  // Very dangerous!
          }

          // Local storage of sensitive data
          function saveToken(token) {
              localStorage.setItem('auth_token', token);
          }

          // Unsafe DOM manipulation
          $(document).ready(function() {
              const userInput = location.hash.substring(1);
              $('#content').html(userInput);
          });
          EOF

          # Test file (should be excluded)
          mkdir -p integration-test/tests
          cat > integration-test/tests/app.test.js << 'EOF'
          // This is a test file and should be excluded from security scanning
          const app = require('../src/app');

          describe('App tests', () => {
              test('should work', () => {
                  expect(true).toBe(true);
              });
          });
          EOF

          # Configuration file with secrets
          cat > integration-test/config/production.js << 'EOF'
          module.exports = {
              database: {
                  host: 'prod-db.example.com',
                  username: 'admin',
                  password: 'super-secret-password-123!',  // Hardcoded password
                  database: 'production'
              },
              jwt: {
                  secret: 'jwt-secret-key-production',  // Hardcoded JWT secret
                  expiresIn: '24h'
              },
              apiKeys: {
                  stripe: 'sk_live_51234567890abcdef',  // API key in code
                  aws: 'AKIAIOSFODNN7EXAMPLE'           // AWS access key
              }
          };
          EOF

          echo "✅ Created realistic Node.js project with multiple vulnerabilities"

      - name: Run OpenGrep Security Scan
        id: security-scan
        uses: ./
        with:
          target: 'integration-test/'
          patterns: 'auto'
          severity: 'INFO'  # Catch all issues
          exclude: 'tests/**,node_modules/**,*.min.js'
          include: 'src/**,config/**,public/**,*.js,*.json'
          verbose: 'true'
          enable-experimental: 'true'
          dataflow-traces: 'true'
          exclude-minified-files: 'true'
          additional-safe-flags: '--matching-explanations'
        continue-on-error: true  # Don't fail on findings

      - name: Analyze Security Scan Results
        run: |
          echo "=== Security Scan Analysis ==="

          JSON_FILE="${STEPS_SECURITY_SCAN_OUTPUTS_JSON_FILE}"
          SARIF_FILE="${STEPS_SECURITY_SCAN_OUTPUTS_SARIF_FILE}"
          FINDINGS_COUNT="${STEPS_SECURITY_SCAN_OUTPUTS_FINDINGS_COUNT}"

          echo "📊 Total findings: $FINDINGS_COUNT"
          echo "📄 JSON results: $JSON_FILE"
          echo "📄 SARIF results: $SARIF_FILE"

          if [ ! -f "$JSON_FILE" ]; then
              echo "❌ JSON results file not found"
              exit 1
          fi

          # Analyze findings by severity
          echo ""
          echo "🔍 Findings by severity:"
          echo "❌ ERROR:   $(jq '[.results[] | select(.extra.severity == "ERROR")] | length' "$JSON_FILE")"
          echo "⚠️  WARNING: $(jq '[.results[] | select(.extra.severity == "WARNING")] | length' "$JSON_FILE")"
          echo "ℹ️  INFO:    $(jq '[.results[] | select(.extra.severity == "INFO")] | length' "$JSON_FILE")"

          # Show top vulnerability types
          echo ""
          echo "🎯 Top vulnerability types found:"
          jq -r '.results[] | .check_id' "$JSON_FILE" | sort | uniq -c | sort -nr | head -10

          # Show files with most issues
          echo ""
          echo "📁 Files with most security issues:"
          jq -r '.results[] | .path' "$JSON_FILE" | sort | uniq -c | sort -nr | head -5

          # Expected vulnerabilities check
          echo ""
          echo "✅ Checking for expected vulnerability types..."

          EXPECTED_VULNS=(
              "sql-injection"
              "command-injection"
              "xss"
              "hardcoded-secret"
              "weak-crypto"
              "path-traversal"
          )

          FOUND_TYPES=$(jq -r '.results[] | .check_id' "$JSON_FILE" | sort | uniq)

          for expected in "${EXPECTED_VULNS[@]}"; do
              if echo "$FOUND_TYPES" | grep -q "$expected"; then
                  echo "✅ Found expected vulnerability type: $expected"
              else
                  echo "⚠️  Expected vulnerability type not found: $expected"
              fi
          done

          # Verify SARIF format
          echo ""
          echo "🔍 SARIF validation:"
          if jq '.version' "$SARIF_FILE" | grep -q "2.1.0"; then
              echo "✅ SARIF version correct"
          else
              echo "❌ SARIF version incorrect"
          fi

          # Check for required SARIF fields
          if jq '.runs[0].results' "$SARIF_FILE" > /dev/null; then
              echo "✅ SARIF results field present"
          else
              echo "❌ SARIF results field missing"
          fi

          echo ""
          echo "🎉 Integration test completed successfully!"
          echo "Found $FINDINGS_COUNT security issues in realistic codebase"
        env:
          STEPS_SECURITY_SCAN_OUTPUTS_JSON_FILE: ${{ steps.security-scan.outputs.json-file }}
          STEPS_SECURITY_SCAN_OUTPUTS_SARIF_FILE: ${{ steps.security-scan.outputs.sarif-file }}
          STEPS_SECURITY_SCAN_OUTPUTS_FINDINGS_COUNT: ${{ steps.security-scan.outputs.findings-count }}

      - name: Generate Security Report
        run: |
          # shellcheck disable=SC2129
          JSON_FILE="${STEPS_SECURITY_SCAN_OUTPUTS_JSON_FILE}"

          cat > security-report.md << 'EOF'
          # Security Scan Report

          ## Summary
          EOF

          echo "- **Total Findings:** ${STEPS_SECURITY_SCAN_OUTPUTS_FINDINGS_COUNT}" >> security-report.md
          echo "- **Scan Date:** $(date)" >> security-report.md
          echo "- **Target:** integration-test/" >> security-report.md
          echo "" >> security-report.md

          echo "## Findings by Severity" >> security-report.md
          echo "" >> security-report.md

          ERROR_COUNT=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' "$JSON_FILE")
          WARNING_COUNT=$(jq '[.results[] | select(.extra.severity == "WARNING")] | length' "$JSON_FILE")
          INFO_COUNT=$(jq '[.results[] | select(.extra.severity == "INFO")] | length' "$JSON_FILE")

          echo "| Severity | Count |" >> security-report.md
          echo "|----------|-------|" >> security-report.md
          echo "| 🔴 ERROR | $ERROR_COUNT |" >> security-report.md
          echo "| 🟡 WARNING | $WARNING_COUNT |" >> security-report.md
          echo "| 🔵 INFO | $INFO_COUNT |" >> security-report.md
          echo "" >> security-report.md

          echo "## Top Issues" >> security-report.md
          echo "" >> security-report.md

          # Add top 5 most critical findings
          jq -r '.results[] | select(.extra.severity == "ERROR") |
            "- **\(.check_id)** in `\(.path):\(.start.line)` - \(.message)"' \
            "$JSON_FILE" | head -5 >> security-report.md

          cat security-report.md

          echo "📝 Security report generated: security-report.md"
        env:
          STEPS_SECURITY_SCAN_OUTPUTS_JSON_FILE: ${{ steps.security-scan.outputs.json-file }}
          STEPS_SECURITY_SCAN_OUTPUTS_FINDINGS_COUNT: ${{ steps.security-scan.outputs.findings-count }}

      - name: Upload Results as Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: integration-test-results
          path: |
            ${{ steps.security-scan.outputs.json-file }}
            ${{ steps.security-scan.outputs.sarif-file }}
            security-report.md
          retention-days: 30

      - name: Comment on Integration Test Success
        if: always()
        run: |
          echo ""
          echo "🎯 Integration Test Summary:"
          echo "✅ Created realistic Node.js application"
          echo "✅ Ran comprehensive security scan"
          echo "✅ Analyzed ${STEPS_SECURITY_SCAN_OUTPUTS_FINDINGS_COUNT} security findings"
          echo "✅ Generated security report"
          echo "✅ Validated JSON and SARIF outputs"
          echo ""
          echo "The OpenGrep Action successfully identified security vulnerabilities"
          echo "in a realistic codebase, demonstrating production-ready functionality!"

        env:
          STEPS_SECURITY_SCAN_OUTPUTS_FINDINGS_COUNT: ${{ steps.security-scan.outputs.findings-count }}

  # Test with Python Django-like application
  python-web-app-scan:
    name: Python Web App Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Create Python Web Application
        run: |
          mkdir -p python-app/{app,config,tests}

          # Django-like web application
          cat > python-app/app/views.py << 'EOF'
          import os
          import sqlite3
          import hashlib
          import subprocess
          from django.http import HttpResponse
          from django.shortcuts import render

          # SQL Injection vulnerability
          def get_user(request, user_id):
              conn = sqlite3.connect('db.sqlite3')
              cursor = conn.cursor()
              query = f"SELECT * FROM users WHERE id = '{user_id}'"
              cursor.execute(query)  # Vulnerable!
              return HttpResponse(cursor.fetchall())

          # Command Injection
          def backup_data(request):
              backup_name = request.GET.get('name', 'backup')
              os.system(f'tar -czf {backup_name}.tar.gz data/')  # Vulnerable!
              return HttpResponse('Backup created')

          # Path Traversal
          def download_file(request, filename):
              file_path = f'/uploads/{filename}'
              with open(file_path, 'rb') as f:  # Vulnerable!
                  return HttpResponse(f.read())

          # Weak cryptography
          def hash_password(password):
              return hashlib.md5(password.encode()).hexdigest()  # Weak!

          # Hardcoded secrets
          SECRET_KEY = 'django-insecure-hardcoded-key-123456'
          DATABASE_PASSWORD = 'admin123'

          # Eval vulnerability
          def execute_code(request):
              code = request.POST.get('code')
              result = eval(code)  # Very dangerous!
              return HttpResponse(result)
          EOF

          # Models with security issues
          cat > python-app/app/models.py << 'EOF'
          from django.db import models
          from django.contrib.auth.models import AbstractUser
          import pickle
          import base64

          class User(AbstractUser):
              # Store sensitive data in plain text
              ssn = models.CharField(max_length=11)  # Should be encrypted
              credit_card = models.CharField(max_length=16)  # Should be encrypted

              def deserialize_preferences(self, data):
                  # Insecure deserialization
                  return pickle.loads(base64.b64decode(data))  # Vulnerable!

          class SessionData(models.Model):
              # Storing session data insecurely
              session_data = models.TextField()  # Should be encrypted

              def save_session(self, data):
                  # Logging sensitive information
                  print(f"Saving session: {data}")  # Information disclosure
                  self.session_data = str(data)
                  self.save()
          EOF

          # Settings with security issues
          cat > python-app/config/settings.py << 'EOF'
          import os

          # Security issues in Django settings
          DEBUG = True  # Should be False in production
          ALLOWED_HOSTS = ['*']  # Too permissive

          # Hardcoded secrets
          SECRET_KEY = 'django-insecure-secret-key-please-change-me'

          # Insecure database configuration
          DATABASES = {
              'default': {
                  'ENGINE': 'django.db.backends.postgresql',
                  'NAME': 'myapp',
                  'USER': 'admin',
                  'PASSWORD': 'password123',  # Hardcoded password
                  'HOST': '192.168.1.100',    # Hardcoded host
                  'PORT': '5432',
              }
          }

          # Insecure session settings
          SESSION_COOKIE_SECURE = False  # Should be True
          SESSION_COOKIE_HTTPONLY = False  # Should be True
          CSRF_COOKIE_SECURE = False  # Should be True

          # Logging passwords (very bad!)
          LOGGING = {
              'handlers': {
                  'file': {
                      'filename': '/tmp/django.log',
                      'formatter': 'verbose',
                  },
              },
              'loggers': {
                  'django.contrib.auth': {
                      'level': 'DEBUG',  # Will log passwords
                  },
              },
          }

          # AWS credentials in code
          AWS_ACCESS_KEY_ID = 'AKIAIOSFODNN7EXAMPLE'
          AWS_SECRET_ACCESS_KEY = 'wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY'
          EOF

          echo "✅ Created Python Django-like application with vulnerabilities"

      - name: Run Python Security Scan
        id: python-scan
        uses: ./
        with:
          target: 'python-app/'
          patterns: 'auto'
          severity: 'WARNING'
          exclude: 'tests/**,__pycache__/**,*.pyc'
          verbose: 'true'
          dataflow-traces: 'true'
        continue-on-error: true

      - name: Validate Python Scan Results
        run: |
          echo "=== Python Security Scan Results ==="

          FINDINGS_COUNT="${STEPS_PYTHON_SCAN_OUTPUTS_FINDINGS_COUNT}"
          echo "🐍 Python findings: $FINDINGS_COUNT"

          if [ "$FINDINGS_COUNT" -eq 0 ]; then
              echo "⚠️  Expected to find vulnerabilities in Python code"
              echo "This may indicate the scan didn't work properly"
          else
              echo "✅ Successfully found security issues in Python code"
          fi

          # Check for Python-specific vulnerabilities
          JSON_FILE="${STEPS_PYTHON_SCAN_OUTPUTS_JSON_FILE}"
          if [ -f "$JSON_FILE" ]; then
              echo ""
              echo "🔍 Python-specific issues found:"
              jq -r '.results[] | select(.path | contains(".py")) | .check_id' "$JSON_FILE" | sort | uniq -c | sort -nr
          fi

        env:
          STEPS_PYTHON_SCAN_OUTPUTS_FINDINGS_COUNT: ${{ steps.python-scan.outputs.findings-count }}

          STEPS_PYTHON_SCAN_OUTPUTS_JSON_FILE: ${{ steps.python-scan.outputs.json-file }}

  # Combine results and generate final report
  integration-summary:
    name: Integration Test Summary
    needs: [nodejs-project-scan, python-web-app-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40
        with:
          egress-policy: audit

      - name: Integration Test Summary
        run: |
          echo "🎯 Integration Test Results Summary"
          echo "=================================="
          echo ""
          echo "Test Results:"
          echo "✅ Node.js Project: ${NEEDS_NODEJS_PROJECT_SCAN_RESULT}"
          echo "✅ Python Web App: ${NEEDS_PYTHON_WEB_APP_SCAN_RESULT}"
          echo ""

          if [[ "${NEEDS_NODEJS_PROJECT_SCAN_RESULT}" == "success" &&
                "${NEEDS_PYTHON_WEB_APP_SCAN_RESULT}" == "success" ]]; then
              echo "🎉 All integration tests passed!"
              echo ""
              echo "The OpenGrep GitHub Action successfully:"
              echo "✅ Installed and configured OpenGrep"
              echo "✅ Scanned realistic Node.js applications"
              echo "✅ Scanned realistic Python applications"
              echo "✅ Identified security vulnerabilities"
              echo "✅ Generated valid JSON and SARIF outputs"
              echo "✅ Handled complex project structures"
              echo "✅ Applied security configurations correctly"
              echo ""
              echo "🚀 Ready for production use!"
          else
              echo "❌ Some integration tests failed"
              echo "Please check the logs above for details"
              exit 1
          fi

        env:
          NEEDS_NODEJS_PROJECT_SCAN_RESULT: ${{ needs.nodejs-project-scan.result }}
          NEEDS_PYTHON_WEB_APP_SCAN_RESULT: ${{ needs.python-web-app-scan.result }}
